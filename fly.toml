app = "sourdough"
primary_region = "iad"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

# Persist the SQLite database across deploys/restarts. The container filesystem
# is ephemeral, so the DB (accounts, keys, subscriptions, usage, specs) lives on
# this volume instead. Single machine only: a volume binds to one machine and
# SQLite is single-writer — do NOT scale count > 1.
[mounts]
  source = "sourdough_data"
  destination = "/data"

[env]
  DATABASE_PATH = "/data/sourdough.db"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
