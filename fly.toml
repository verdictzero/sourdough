# fly.toml app configuration file generated for sourdough on 2026-06-16T19:53:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sourdough'
primary_region = 'iad'

[build]

[env]
  DATABASE_PATH = '/data/sourdough.db'

[[mounts]]
  source = 'sourdough_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
