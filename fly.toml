# fly.toml app configuration file for sourdough
#
# See https://fly.io/docs/reference/configuration/ for details.

app = 'sourdough'
primary_region = 'iad'

[build]

[env]
  # SQLite lives on the mounted volume so it survives deploys/restarts.
  DATABASE_PATH = '/data/sourdough.db'
  # `next start` binds this port; must match http_service.internal_port.
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'sourdough_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
